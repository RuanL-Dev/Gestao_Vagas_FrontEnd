<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Cadastro de Vagas</title>
</head>

    <body class="bg-white h-screen flex flex-col">

        <nav class="bg-zinc-900 p-4 flex justify-between items-center">
                 <div>
                    <a href="/company/jobs" class="text-white text-lg font-semibold">Cadastro</a>
                </div>
                <div>
                    <a href="/company/jobs/list" class="text-white text-lg font-semibold">Listagem</a>
                </div>
                <div>
                    <a href="/company/logout" class="text-white text-lg font-semibold">Logout</a>
                </div>
        </nav>

        <div class="flex-grow flex items-center justify-center">
            <div class="bg-gray-200 rounded-lg w-3/4 p-8 max-w-xl shadow-lg">
                <h1 class="text-gray-800 text-3xl mb-6">Cadastro de Vagas</h1>

                <form th:action="@{/company/jobs}" th:object="${jobs}" method="post" class="space-y-4">
                    <div>
                        <label for="title" class="block text-gray-700 font-bold mb-2">Descrição da Vaga</label>
                        <input type="text" placeholder="Ex: Desenvolvedor Full Stack"
                        id="title" name="description" th:field="*{description}" class="w-full bg-gray-100 text-gray-800 text-lg p-2 rounded focus:outline-none focus:ring-2 focus:ring-green-600">
                    </div>
                    <div>
                        <label for="level" class="block text-gray-700 font-bold mb-2">Nível</label>
                        <input type="text" placeholder="Ex: Júnior, Pleno, Sênior"
                        id="level" name="level" th:field="*{level}" class="w-full bg-gray-100 text-gray-800 text-lg p-2 rounded focus:outline-none focus:ring-2 focus:ring-green-600">
                    </div>
                    <div>
                        <label for="benefits" class="block text-gray-700 font-bold mb-2">Benefícios da vaga</label>
                        <input type="text" placeholder="Ex: Vale Refeição, Plano de Saúde"
                        id="benefits" name="benefits" th:field="*{benefits}" class="w-full bg-gray-100 text-gray-800 text-lg p-2 rounded focus:outline-none focus:ring-2 focus:ring-green-600">
                    </div>

                    <div>
                        <button class="bg-green-900 w-full py-3 rounded text-white text-lg hover:bg-green-700">Cadastrar Vaga</button> 
                    </div>
                </form>
            </div>
        </div>

    </body>


</html>
