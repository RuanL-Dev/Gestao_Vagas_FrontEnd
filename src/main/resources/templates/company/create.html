<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Cadastro de Company</title>
</head>

<body class="bg-sky-950 h-screen flex items-center justify-center">
    <form id="submitForm" action="" class="flex gap-24" th:action="@{/company/create}" method="post" th:object="${company}">
        <div class="space-y-8 bg-zinc-900 rounded-md p-10">
            <p class="text-white">Empresa, crie o seu cadastro gratuitamente</p>
            <div class="flex flex-row gap-10">
                <input type="text" name="username" class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 
                focus:outline-none focus:ring-2 focus:ring-green-600" placeholder="Digite seu usuário" th:field="*{username}">
    
                <input type="text" name="name" class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 
                focus:outline-none focus:ring-2 focus:ring-green-600" placeholder="Digite seu nome" th:field="*{name}">

            </div>
            
            <div class="flex flex-row gap-10">
                <input type="email" name="email" class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 
                focus:outline-none focus:ring-2 focus:ring-green-600" placeholder="Digite seu email" th:field="*{email}">
                
                <input type="text" name="website" class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 
                focus:outline-none focus:ring-2 focus:ring-green-600" placeholder="Website" th:field="*{website}">
            </div>

            <div class="flex flex-row gap-10">
                <input type="password" name="password" id="password" class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 
                focus:outline-none focus:ring-2 focus:ring-green-600" placeholder="Senha" th:field="*{password}">
    
                <input type="password" name="confirmPassword" id="confirmPassword" class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 
                focus:outline-none focus:ring-2 focus:ring-green-600" placeholder="Confirme a senha">
            </div>


            <textarea name="description" placeholder="Digite uma breve descrição sobre você" class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 
            focus:outline-none focus:ring-2 focus:ring-green-600" rows="4" th:field="*{description}"></textarea>
            
            <p class="text-red-400" th:if="${error_message}" th:text="${error_message}"></p>
            <p class="text-red-400 hidden" id="password_Error">As senhas não conferem</p>
            <button type="submit" class="bg-green-700 w-full p-4 rounded text-white hover:bg-green-600" >Cadastrar</button>
            <p class="mt-4 text-white">Já tem uma conta?<a href="/company/login" class="text-center text-green-700 hover:text-green-600">
                Faça login aqui
                </a>
            </p>
        </div>
        <div class="text-white max-w-80 text-6xl flex items-center justify-center">
            Gestão de Vagas
        </div>
    </form>
</body>

<script>
    document.getElementById("submitForm").addEventListener("submit", (event) => {
        var password = document.getElementById("password").value;
        var confirmPassword = document.getElementById("confirmPassword").value;
        if (password !== confirmPassword) {
            event.preventDefault();
            document.getElementById("password_Error").classList.remove("hidden");
        }
    })
</script>
</html>
